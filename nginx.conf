events { worker_connections 1024; }

http {
  # Rate limit zones
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=shield_js:10m rate=120r/m;

  # Gzip
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;
  gzip_min_length 1024;

  upstream mathshield_app {
    server app:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer-when-downgrade;

    # shield.js — CDN cached, CORS open
    location = /shield.js {
      limit_req zone=shield_js burst=20 nodelay;
      proxy_pass http://mathshield_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      add_header Cache-Control "public, max-age=3600";
      add_header Access-Control-Allow-Origin "*";
      add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    # API routes — rate limited
    location /api/ {
      limit_req zone=api burst=10 nodelay;
      limit_req_status 429;

      proxy_pass http://mathshield_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_http_version 1.1;
      proxy_set_header Connection "";

      # CORS preflight
      if ($request_method = OPTIONS) {
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Api-Key";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        return 204;
      }
    }

    # Static pages
    location / {
      proxy_pass http://mathshield_app;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
